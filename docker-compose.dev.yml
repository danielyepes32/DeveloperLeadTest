# Dev overlay: live reload without rebuilds.
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# Source is bind-mounted and uvicorn --reload restarts on file changes, so you
# iterate on app code without rebuilding the image.
services:
  api:
    volumes:
      - ./app:/app/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    environment:
      APP_ENV: development
      LOG_LEVEL: DEBUG
