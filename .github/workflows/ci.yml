name: CI/CD

# Estrategia de despliegue (ver Arquitectura/ADR/0001-estrategia-despliegue.md):
#   - Push a `main`           -> deploy a STAGING (continuous deployment)
#   - Tag semántico `vX.Y.Z`  -> deploy a PRODUCCIÓN (release, con aprobación)
# Todo cambio pasa por los quality gates (lint + tests + escaneo) antes de desplegar.
on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:

# Permite cancelar runs viejos del mismo ref para ahorrar minutos de CI.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  quality:
    name: Lint + Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.15"
          enable-cache: true
      - run: uv sync --frozen
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Tests (pytest + coverage)
        run: uv run pytest
        env:
          DATABASE_URL: "sqlite:///:memory:"
          JWT_SECRET: ci-secret

  build:
    name: Build image
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (local, validates the Dockerfile)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: procurement-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      # Real deploys push this image to a registry (GHCR/ECR); here we build &
      # scan it as a quality gate. See Arquitectura/ADR/0001-estrategia-despliegue.md.
      - name: Scan image (Trivy, falla en CRITICAL fixables)
        uses: aquasecurity/trivy-action@v0.30.0
        with:
          image-ref: procurement-api:ci
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL

  deploy-staging:
    name: Deploy to staging
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Deploy
        run: |
          echo "Desplegando ${IMAGE}:main a STAGING"
          # Punto de integración real: kubectl set image / helm upgrade /
          # aws ecs update-service / docker compose pull && up -d, etc.

  deploy-production:
    name: Deploy to production
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    # El environment 'production' lleva required reviewers => despliegue con aprobación.
    environment: production
    steps:
      - name: Deploy
        run: |
          echo "Desplegando ${IMAGE}:${GITHUB_REF_NAME} a PRODUCCIÓN"
          # Estrategia blue/green o canary + healthcheck + rollback automático.
